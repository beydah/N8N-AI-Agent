<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.06" />
    </filter>
    
    <!-- Linear Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="#f8fafc" />
  <rect x="1" y="1" width="798" height="498" rx="15" fill="none" stroke="#e2e8f0" stroke-width="2" />

  <!-- Title -->
  <text x="40" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0f172a">🤖 WordPress AI Blogger Workflow</text>
  <text x="40" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b">Automated pipeline reading news feeds, generating articles/images, and publishing to WordPress</text>

  <!-- Connecting Lines -->
  <!-- Step 1 to Step 2 -->
  <path d="M 180 180 L 260 180" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 4" />
  <!-- Step 2 to Step 3 -->
  <path d="M 400 180 L 480 180" fill="none" stroke="#cbd5e1" stroke-width="2" />
  <!-- Step 3 to Step 4 -->
  <path d="M 620 180 L 620 280" fill="none" stroke="#cbd5e1" stroke-width="2" />
  <!-- Step 4 to Step 5 -->
  <path d="M 540 330 L 440 330" fill="none" stroke="#cbd5e1" stroke-width="2" />
  <!-- Step 5 to Step 6 -->
  <path d="M 280 330 L 180 330" fill="none" stroke="#cbd5e1" stroke-width="2" />

  <!-- Node 1: Schedule & RSS -->
  <g transform="translate(40, 130)" filter="url(#shadow)">
    <rect width="140" height="100" rx="8" fill="url(#blueGrad)" />
    <text x="70" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">1. Schedule</text>
    <text x="70" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#dbeafe" text-anchor="middle">Schedule Trigger</text>
    <text x="70" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">(Daily at 23:00)</text>
    <text x="70" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Fetch News RSS</text>
  </g>

  <!-- Node 2: Content Context -->
  <g transform="translate(260, 130)" filter="url(#shadow)">
    <rect width="140" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="70" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">2. Context</text>
    <text x="70" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Fetch Latest Post</text>
    <text x="70" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">for topic balance</text>
  </g>

  <!-- Node 3: AI Writer -->
  <g transform="translate(480, 130)" filter="url(#shadow)">
    <rect width="140" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="70" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">3. Writer (AI)</text>
    <text x="70" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Gemini Text API</text>
    <text x="70" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">(SEO HTML content)</text>
  </g>

  <!-- Node 4: AI Designer -->
  <g transform="translate(540, 280)" filter="url(#shadow)">
    <rect width="160" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="80" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">4. Design Prompt</text>
    <text x="80" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Gemini Prompter</text>
    <text x="80" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Designs cover block-art</text>
    <text x="80" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">(Voxel-art design)</text>
  </g>

  <!-- Node 5: Image Generation -->
  <g transform="translate(280, 280)" filter="url(#shadow)">
    <rect width="160" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="80" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">5. Generate Banner</text>
    <text x="80" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Gemini Image API</text>
    <text x="80" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Renders Minecraft-style</text>
    <text x="80" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981" font-weight="600" text-anchor="middle">Uploads to Media Library</text>
  </g>

  <!-- Node 6: Publish Post -->
  <g transform="translate(40, 280)" filter="url(#shadow)">
    <rect width="140" height="100" rx="8" fill="url(#emeraldGrad)" />
    <text x="70" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">6. Publish Post</text>
    <text x="70" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#d1fae5" text-anchor="middle">WP REST API</text>
    <text x="70" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#a7f3d0" text-anchor="middle">(Publishes Live Post)</text>
  </g>
</svg>
