<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" width="100%" height="100%">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#21262d" />
    </pattern>

    <!-- Drop Glow Filters -->
    <filter id="glowOrange" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#f0883e" flood-opacity="0.15" />
    </filter>
    <filter id="glowCyan" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#58a6ff" flood-opacity="0.15" />
    </filter>
    <filter id="glowGreen" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#3fb950" flood-opacity="0.15" />
    </filter>
    <filter id="glowSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#010409" flood-opacity="0.5" />
    </filter>

    <!-- Linear Gradients -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffaf7a" />
      <stop offset="100%" stop-color="#f0883e" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#79c0ff" />
      <stop offset="100%" stop-color="#58a6ff" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#56d364" />
      <stop offset="100%" stop-color="#3fb950" />
    </linearGradient>

    <!-- Marker Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#30363d" />
    </marker>
  </defs>

  <!-- Background Base (GitHub Dark Canvas) -->
  <rect width="850" height="520" rx="12" fill="#0d1117" />
  <rect width="850" height="520" fill="url(#grid)" rx="12" />
  
  <!-- Outer Stroke -->
  <rect x="1" y="1" width="848" height="518" rx="11" fill="none" stroke="#30363d" stroke-width="1.5" />

  <!-- Title Section -->
  <text x="50" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#f0f6fc">🎯 Google Maps Lead Scraper Workflow</text>
  <text x="50" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e" font-weight="400">Form-triggered pipeline query parsing Google Maps leads and logging them to Sheets CRM</text>

  <!-- Connecting Lines -->
  <!-- Step 1 to Step 2 -->
  <path d="M 190 190 L 260 190" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)" />
  <!-- Step 2 to Step 3 -->
  <path d="M 420 190 L 490 190" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />
  <!-- Step 3 to Step 4 -->
  <path d="M 650 190 Q 730 190 730 260" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />
  <!-- Step 4 to Step 5 -->
  <path d="M 650 340 L 480 340" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />
  <!-- Step 5 to Step 6 -->
  <path d="M 320 340 L 210 340" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Node 1: Webhook Trigger (n8n Form) -->
  <g transform="translate(50, 140)" filter="url(#glowOrange)">
    <rect width="140" height="100" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="1.5" />
    <text x="70" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#f0883e" text-anchor="middle">1. Trigger</text>
    <text x="70" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" font-weight="500" text-anchor="middle">n8n Form URL</text>
    <text x="70" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#484f58" font-weight="500" text-anchor="middle">(Keyword &amp; Loc)</text>
  </g>

  <!-- Node 2: Search Google Maps -->
  <g transform="translate(260, 140)" filter="url(#glowSoft)">
    <rect width="160" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="80" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9" text-anchor="middle">2. Search Maps</text>
    <text x="80" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Places Text Search</text>
    <text x="80" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#484f58" text-anchor="middle">(3 pages + delay loops)</text>
  </g>

  <!-- Node 3: Merge Results -->
  <g transform="translate(490, 140)" filter="url(#glowSoft)">
    <rect width="160" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="80" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9" text-anchor="middle">3. Consolidate</text>
    <text x="80" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Compile List Rows</text>
    <text x="80" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#484f58" text-anchor="middle">(Merge &amp; deduplicate)</text>
  </g>

  <!-- Node 4: Smart DB Deduplication -->
  <g transform="translate(650, 270)" filter="url(#glowSoft)">
    <rect width="150" height="105" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="75" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9" text-anchor="middle">4. Check DB</text>
    <text x="75" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Read Google Sheets</text>
    <text x="75" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#58a6ff" font-weight="600" text-anchor="middle">Skip existing IDs</text>
    <text x="75" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#484f58" text-anchor="middle">(Prevents duplication)</text>
  </g>

  <!-- Node 5: Enrich & Validate Leads -->
  <g transform="translate(320, 290)" filter="url(#glowSoft)">
    <rect width="160" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="80" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9" text-anchor="middle">5. Enrich Leads</text>
    <text x="80" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Places Details API</text>
    <text x="80" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#f85149" font-weight="600" text-anchor="middle">Filter out no-phone</text>
  </g>

  <!-- Node 6: Save Leads to Sheets CRM -->
  <g transform="translate(50, 290)" filter="url(#glowGreen)">
    <rect width="160" height="100" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5" />
    <text x="80" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#3fb950" text-anchor="middle">6. Save Leads</text>
    <text x="80" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" font-weight="500" text-anchor="middle">Append Sheet CRM</text>
    <text x="80" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#3fb950" font-weight="600" text-anchor="middle">(Sends success form)</text>
  </g>
</svg>
