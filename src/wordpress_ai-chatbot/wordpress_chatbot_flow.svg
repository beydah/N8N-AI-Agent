<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" width="100%" height="100%">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#1e293b" />
    </pattern>

    <!-- Drop Glow Filters -->
    <filter id="glowPurple" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#a855f7" flood-opacity="0.25" />
    </filter>
    <filter id="glowCyan" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#06b6d4" flood-opacity="0.25" />
    </filter>
    <filter id="glowGreen" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#10b981" flood-opacity="0.25" />
    </filter>
    <filter id="glowSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.4" />
    </filter>

    <!-- Linear Gradients -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Marker Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#475569" />
    </marker>
  </defs>

  <!-- Background Base -->
  <rect width="850" height="520" rx="20" fill="#0b0f19" />
  <rect width="850" height="520" fill="url(#grid)" rx="20" />
  
  <!-- Outer Stroke -->
  <rect x="1" y="1" width="848" height="518" rx="19" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Title Section -->
  <text x="50" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#f8fafc">💬 WordPress AI Chatbot Workflow</text>
  <text x="50" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" font-weight="500">Real-time web chat widget backend linking DOM context, memory buffers, and Gemini Agent</text>

  <!-- Connecting Lines -->
  <!-- Step 1 to Step 2 -->
  <path d="M 190 190 L 260 190" fill="none" stroke="#334155" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrow)" />
  <!-- Step 2 to Step 3 -->
  <path d="M 420 190 L 490 190" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  <!-- Step 3 to Step 4 -->
  <path d="M 650 190 Q 730 190 730 260" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  <!-- Step 4 to Step 5 -->
  <path d="M 650 340 L 480 340" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  <!-- Step 5 to Step 6 -->
  <path d="M 320 340 L 210 340" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />

  <!-- Node 1: Chat Widget Trigger -->
  <g transform="translate(50, 140)" filter="url(#glowCyan)">
    <rect width="140" height="100" rx="14" fill="url(#cyanGrad)" stroke="#67e8f9" stroke-width="1.5" />
    <text x="70" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">1. User Event</text>
    <text x="70" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c7d2fe" font-weight="600" text-anchor="middle">Web Chat Panel</text>
    <text x="70" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#93c5fd" font-weight="500" text-anchor="middle">(Widget Opened)</text>
  </g>

  <!-- Node 2: Enrich Context -->
  <g transform="translate(260, 140)" filter="url(#glowSoft)">
    <rect width="160" height="100" rx="14" fill="#111827" stroke="#1f2937" stroke-width="2" />
    <text x="80" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#f8fafc" text-anchor="middle">2. Context Ingest</text>
    <text x="80" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Appends page URL</text>
    <text x="80" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">&amp; body content context</text>
  </g>

  <!-- Node 3: Chat Webhook CORS -->
  <g transform="translate(490, 140)" filter="url(#glowSoft)">
    <rect width="160" height="100" rx="14" fill="#111827" stroke="#1f2937" stroke-width="2" />
    <text x="80" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#f8fafc" text-anchor="middle">3. Chat Trigger</text>
    <text x="80" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">n8n CORS Webhook</text>
    <text x="80" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ef4444" font-weight="600" text-anchor="middle">Allowed Origins filter</text>
  </g>

  <!-- Node 4: Cognitive Memory -->
  <g transform="translate(650, 270)" filter="url(#glowSoft)">
    <rect width="150" height="105" rx="14" fill="#111827" stroke="#1f2937" stroke-width="2" />
    <text x="75" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#f8fafc" text-anchor="middle">4. Memory</text>
    <text x="75" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Buffer Window</text>
    <text x="75" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#e2e8f0" font-weight="500" text-anchor="middle">Keeps last 10 texts</text>
  </g>

  <!-- Node 5: Gemini Agent Process -->
  <g transform="translate(320, 290)" filter="url(#glowPurple)">
    <rect width="160" height="100" rx="14" fill="#111827" stroke="url(#purpleGrad)" stroke-width="2" />
    <text x="80" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#f8fafc" text-anchor="middle">5. AI Chatbot</text>
    <text x="80" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c084fc" text-anchor="middle">Gemini Agent Node</text>
    <text x="80" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#a855f7" font-weight="700" text-anchor="middle">Generates styled HTML</text>
  </g>

  <!-- Node 6: Visual UI Output -->
  <g transform="translate(50, 290)" filter="url(#glowGreen)">
    <rect width="160" height="100" rx="14" fill="url(#greenGrad)" stroke="#34d399" stroke-width="1.5" />
    <text x="80" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">6. Web Panel</text>
    <text x="80" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a7f3d0" font-weight="600" text-anchor="middle">Renders HTML cards</text>
    <text x="80" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#047857" font-weight="700" text-anchor="middle">(With forms &amp; buttons)</text>
  </g>
</svg>
