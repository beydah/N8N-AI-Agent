<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" width="100%" height="100%">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#21262d" />
    </pattern>

    <!-- Drop Glow Filters -->
    <filter id="glowPurple" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#bc8cff" flood-opacity="0.15" />
    </filter>
    <filter id="glowCyan" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#58a6ff" flood-opacity="0.15" />
    </filter>
    <filter id="glowGreen" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#3fb950" flood-opacity="0.15" />
    </filter>
    <filter id="glowSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#010409" flood-opacity="0.5" />
    </filter>

    <!-- Linear Gradients -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d2a8ff" />
      <stop offset="100%" stop-color="#bc8cff" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#79c0ff" />
      <stop offset="100%" stop-color="#58a6ff" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#56d364" />
      <stop offset="100%" stop-color="#3fb950" />
    </linearGradient>

    <!-- Marker Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#30363d" />
    </marker>
  </defs>

  <!-- Background Base (GitHub Dark Canvas) -->
  <rect width="850" height="520" rx="12" fill="#0d1117" />
  <rect width="850" height="520" fill="url(#grid)" rx="12" />
  
  <!-- Outer Stroke -->
  <rect x="1" y="1" width="848" height="518" rx="11" fill="none" stroke="#30363d" stroke-width="1.5" />

  <!-- Title Section -->
  <text x="50" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#f0f6fc">💬 WordPress AI Chatbot Workflow</text>
  <text x="50" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e" font-weight="400">Real-time web chat widget backend linking DOM context, memory buffers, and Gemini Agent</text>

  <!-- Connecting Lines -->
  <!-- Step 1 to Step 2 -->
  <path d="M 190 190 L 260 190" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)" />
  <!-- Step 2 to Step 3 -->
  <path d="M 420 190 L 490 190" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />
  <!-- Step 3 to Step 4 -->
  <path d="M 650 190 Q 730 190 730 260" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />
  <!-- Step 4 to Step 5 -->
  <path d="M 650 340 L 480 340" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />
  <!-- Step 5 to Step 6 -->
  <path d="M 320 340 L 210 340" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Node 1: Chat Widget Trigger -->
  <g transform="translate(50, 140)" filter="url(#glowCyan)">
    <rect width="140" height="100" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" />
    <text x="70" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#58a6ff" text-anchor="middle">1. User Event</text>
    <text x="70" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" font-weight="500" text-anchor="middle">Web Chat Panel</text>
    <text x="70" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#484f58" font-weight="500" text-anchor="middle">(Widget Opened)</text>
  </g>

  <!-- Node 2: Enrich Context -->
  <g transform="translate(260, 140)" filter="url(#glowSoft)">
    <rect width="160" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="80" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9" text-anchor="middle">2. Context Ingest</text>
    <text x="80" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Appends page URL</text>
    <text x="80" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#484f58" text-anchor="middle">&amp; body content context</text>
  </g>

  <!-- Node 3: Chat Webhook CORS -->
  <g transform="translate(490, 140)" filter="url(#glowSoft)">
    <rect width="160" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="80" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9" text-anchor="middle">3. Chat Trigger</text>
    <text x="80" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">n8n CORS Webhook</text>
    <text x="80" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#f85149" font-weight="600" text-anchor="middle">Allowed Origins filter</text>
  </g>

  <!-- Node 4: Cognitive Memory -->
  <g transform="translate(650, 270)" filter="url(#glowSoft)">
    <rect width="150" height="105" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="75" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9" text-anchor="middle">4. Memory</text>
    <text x="75" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Buffer Window</text>
    <text x="75" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#484f58" text-anchor="middle">Keeps last 10 texts</text>
  </g>

  <!-- Node 5: Gemini Agent Process -->
  <g transform="translate(320, 290)" filter="url(#glowPurple)">
    <rect width="160" height="100" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="1.5" />
    <text x="80" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#d2a8ff" text-anchor="middle">5. AI Chatbot</text>
    <text x="80" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Gemini Agent Node</text>
    <text x="80" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#bc8cff" font-weight="600" text-anchor="middle">Generates styled HTML</text>
  </g>

  <!-- Node 6: Visual UI Output -->
  <g transform="translate(50, 290)" filter="url(#glowGreen)">
    <rect width="160" height="100" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5" />
    <text x="80" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#3fb950" text-anchor="middle">6. Web Panel</text>
    <text x="80" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Renders HTML cards</text>
    <text x="80" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#484f58" text-anchor="middle">(With forms &amp; buttons)</text>
  </g>
</svg>
