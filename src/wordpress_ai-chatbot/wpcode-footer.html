    if (window.__beydahAiWidgetLoaded) return;
    window.__beydahAiWidgetLoaded = true;

    const SELECTORS = {
      panel: 'ai-panel',
      openBtn: 'ai-open',
      closeBtn: 'ai-close',
      introBtn: 'ai-intro',
      chatRoot: '#ai-chat'
    };

    const CONSTANTS = {
      introDelay: 5000,
      introDuration: 5000,
      storageKey: 'aiIntroSeen',
      maxChars: 100,
      copyVisibleMs: 2400
    };

    const panel = document.getElementById(SELECTORS.panel);
    const openButton = document.getElementById(SELECTORS.openBtn);
    const closeButton = document.getElementById(SELECTORS.closeBtn);
    const introButton = document.getElementById(SELECTORS.introBtn);
    const chatContainer = document.querySelector(SELECTORS.chatRoot);

    if (!panel || !openButton || !closeButton || !chatContainer) return;

    const originalFetch = window.fetch.bind(window);
    window.fetch = async function(input, init) {
      try {
        const requestUrl = typeof input === 'string' ? input : (input && input.url ? input.url : '');
        const parsedUrl = requestUrl ? new URL(requestUrl, window.location.origin) : null;
        const action = parsedUrl ? parsedUrl.searchParams.get('action') : null;
        const isChatRequest = requestUrl.includes('/chat');
        const bodyIsString = init && typeof init.body === 'string';

        if (isChatRequest && bodyIsString) {
          const bodyObj = JSON.parse(init.body);
          const isSendMessage = action === 'sendMessage' || bodyObj.action === 'sendMessage';
          const textKey = typeof bodyObj.chatInput === 'string' ? 'chatInput' : (typeof bodyObj.text === 'string' ? 'text' : null);

          if (isSendMessage && textKey && bodyObj[textKey].trim() && !bodyObj[textKey].includes('[System Context:')) {
            const pageUrl = window.location.href;
            const pageContent = document.body.innerText.replace(/\s+/g, ' ').substring(0, 400);
            bodyObj[textKey] += `\n\n[System Context: User is on page ${pageUrl} | Content summary: ${pageContent}...]`;
            init = { ...init, body: JSON.stringify(bodyObj) };
          }
        }
      } catch (error) {
        console.warn('AI Chat context skipped:', error);
      }

      return originalFetch(input, init);
    };

    const chatConfig = {
      webhookUrl: 'https://[YOUR_N8N_DOMAIN]/webhook/[YOUR_WEBHOOK_UUID]/chat',
      target: SELECTORS.chatRoot,
      mode: 'fullscreen',
      webhookConfig: { method: 'POST', headers: {} },
      chatInputKey: 'chatInput',
      chatSessionKey: 'sessionId',
      loadPreviousSession: false,
      showWelcomeScreen: false,
      defaultLanguage: 'tr',
      metadata: {
        source: 'wordpress',
        pageUrl: window.location.href,
        pageTitle: document.title
      },
      initialMessages: [
        'Merhaba! Ben [YOUR_AI_NAME]. Size nasıl yardımcı olabilirim?'
      ],
      i18n: {
        tr: {
          title: '[YOUR_AI_NAME]',
          subtitle: 'Hizmetler, süreçler ve iletişim yönlendirmeleri için buradayım.',
          footer: '',
          getStarted: 'Yeni konuşma başlat',
          inputPlaceholder: 'Mesajınızı yazın...'
        },
        en: {
          title: '[YOUR_AI_NAME]',
          subtitle: 'I am here to assist with services, processes, and contact routing.',
          footer: '',
          getStarted: 'Start a new conversation',
          inputPlaceholder: 'Type your message...'
        }
      },
      enableStreaming: false
    };

    try {
      createChat(chatConfig);
    } catch (error) {
      console.error('AI Chatbot initialization error:', error);
      return;
    }

    const getChatElements = () => {
      const composer = chatContainer.querySelector('.chat-input, .chat-footer');
      const input = composer ? composer.querySelector('textarea') : null;
      const sendBtn = composer ? composer.querySelector('button[type="submit"], button[class*="send"], button[aria-label*="Send"], button[aria-label*="Gönder"]') : null;
      const messages = chatContainer.querySelector('.chat-messages-list') || Array.from(chatContainer.querySelectorAll('[class*="messages"]')).find((el) => {
        return !el.closest('.chat-input, .chat-footer, .chat-message');
      });

      return { composer, input, sendBtn, messages };
    };

    const updateCounter = () => {
      const { composer, input } = getChatElements();
      if (!composer || !input) return;
      const counter = composer.querySelector('.ai-char-counter');
      if (!counter) return;
      const currentLength = input.value.length;
      counter.textContent = `${currentLength} / ${CONSTANTS.maxChars}`;
      counter.style.color = currentLength >= CONSTANTS.maxChars - 10 ? '#ef4444' : '';
    };

    const autoResizeInput = () => {
      const { input } = getChatElements();
      if (!input || input.tagName !== 'TEXTAREA') return;
      input.style.height = window.matchMedia('(max-width: 900px)').matches ? '40px' : '42px';
      input.style.height = Math.min(input.scrollHeight, 144) + 'px';
    };

    const scrollToBottom = () => {
      const { messages } = getChatElements();
      if (messages) messages.scrollTo({ top: messages.scrollHeight, behavior: 'smooth' });
    };

    const unlockComposer = (enableSendButton = false) => {
      const { input, sendBtn } = getChatElements();
      if (input) {
        input.disabled = false;
        input.removeAttribute('disabled');
        input.maxLength = CONSTANTS.maxChars;
        input.placeholder = 'Mesajınızı yazın...';
      }
      if (sendBtn && enableSendButton && input && input.value.trim()) {
        sendBtn.disabled = false;
        sendBtn.removeAttribute('disabled');
      }
    };

    const handleIntroMessage = () => {
      if (!sessionStorage.getItem(CONSTANTS.storageKey) && introButton) {
        setTimeout(() => {
          if (!document.body.classList.contains('ai-open')) {
            introButton.classList.add('show');
            setTimeout(() => {
              introButton.classList.remove('show');
            }, CONSTANTS.introDuration);
          }
        }, CONSTANTS.introDelay);
      } else if (introButton) {
        introButton.style.display = 'none';
      }
    };

    const openChat = () => {
      document.body.classList.add('ai-open');
      panel.setAttribute('aria-hidden', 'false');
      sessionStorage.setItem(CONSTANTS.storageKey, '1');

      if (introButton) {
        introButton.classList.remove('show');
        setTimeout(() => {
          introButton.style.display = 'none';
        }, 400);
      }

      setTimeout(() => {
        const { input } = getChatElements();
        const isMobile = window.matchMedia('(max-width: 900px)').matches;
        unlockComposer(false);
        if (input && !isMobile) input.focus();
        scrollToBottom();
      }, 300);
    };

    const closeChat = () => {
      document.body.classList.remove('ai-open');
      panel.setAttribute('aria-hidden', 'true');
      openButton.focus();
    };

    const setInputValue = (value) => {
      const { input } = getChatElements();
      if (!input) return false;

      const safeValue = String(value).slice(0, CONSTANTS.maxChars);
      const setter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value')?.set;
      if (setter) setter.call(input, safeValue);
      else input.value = safeValue;

      input.dispatchEvent(new Event('input', { bubbles: true }));
      input.dispatchEvent(new Event('change', { bubbles: true }));
      autoResizeInput();
      updateCounter();
      unlockComposer(true);
      input.focus();
      return true;
    };

    const sendCurrentMessage = () => {
      const { input, sendBtn } = getChatElements();
      if (!input || !input.value.trim()) return;
      unlockComposer(true);
      if (sendBtn) {
        sendBtn.click();
        setTimeout(() => {
          updateCounter();
          scrollToBottom();
        }, 250);
      }
    };

    const buildQuickActions = (composer) => {
      if (!composer || chatContainer.querySelector('.ai-quick-actions')) return;

      const prompts = ['Hizmetlerin neler?', 'Projelerini göster', 'İletişim bilgilerini paylaş'];
      const wrapper = document.createElement('div');
      wrapper.className = 'ai-quick-actions';

      prompts.forEach((text) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'ai-quick-action';
        btn.textContent = text;
        btn.addEventListener('click', () => {
          if (setInputValue(text)) {
            setTimeout(sendCurrentMessage, 120);
          }
        });
        wrapper.appendChild(btn);
      });

      composer.parentNode.insertBefore(wrapper, composer);
      wrapper.addEventListener('wheel', (event) => {
        if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
          wrapper.scrollLeft += event.deltaY;
          event.preventDefault();
        }
      }, { passive: false });
    };

    const secureLinks = () => {
      const { messages } = getChatElements();
      if (!messages) return;
      const links = messages.querySelectorAll('.chat-message-from-bot a:not([target="_blank"])');
      links.forEach((link) => {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      });
    };

    const addTimestamp = (msg) => {
      if (msg.dataset.timeAdded === '1' || msg.querySelector('.chat-typing')) return;
      const timeDiv = document.createElement('div');
      timeDiv.className = 'ai-timestamp';
      const now = new Date();
      timeDiv.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      msg.appendChild(timeDiv);
      msg.dataset.timeAdded = '1';
    };

    const addCopyButton = (msg) => {
      if (!msg.classList.contains('chat-message-from-bot') || msg.querySelector('.chat-typing') || msg.querySelector('.ai-copy-btn')) return;

      msg.tabIndex = 0;
      const copyBtn = document.createElement('button');
      copyBtn.type = 'button';
      copyBtn.className = 'ai-copy-btn';
      copyBtn.title = 'Mesajı Kopyala';
      copyBtn.setAttribute('aria-label', 'Mesajı kopyala');
      copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';

      copyBtn.addEventListener('click', async (event) => {
        event.preventDefault();
        event.stopPropagation();
        const clone = msg.cloneNode(true);
        clone.querySelectorAll('button, .ai-timestamp').forEach((item) => item.remove());
        try {
          await navigator.clipboard.writeText(clone.innerText.trim());
          copyBtn.classList.add('copied');
          setTimeout(() => copyBtn.classList.remove('copied'), 1600);
        } catch (error) {
          console.warn('AI Chat copy failed:', error);
        }
      });

      msg.appendChild(copyBtn);
    };

    const bindBotForms = (msg) => {
      msg.querySelectorAll('form').forEach((form) => {
        if (form.dataset.aiFormBound === '1') return;
        form.dataset.aiFormBound = '1';
        form.addEventListener('submit', () => {
          setTimeout(() => unlockComposer(false), 150);
          setTimeout(() => unlockComposer(false), 900);
        }, true);
      });
    };

    const parseBotHtml = (msg) => {
      if (!msg.classList.contains('chat-message-from-bot') || msg.dataset.htmlParsed === '1' || msg.querySelector('.chat-typing')) return;

      let rawText = msg.textContent.trim();
      if (!rawText) return;

      if (rawText.includes('{"type":') && rawText.includes('"content":')) {
        let extractedHTML = '';
        rawText.split('\n').forEach((line) => {
          try {
            const parsed = JSON.parse(line.trim());
            if (parsed.type === 'item' && parsed.content) extractedHTML += parsed.content;
          } catch (error) {}
        });
        if (extractedHTML) rawText = extractedHTML;
      }

      rawText = rawText
        .replace(/\\n/g, '<br>')
        .replace(/\\"/g, '"')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s]+)\)/g, '<a href="$2" target="_blank" class="ai-btn" style="display: inline-block; padding: 10px 20px; background-color: #2457d6; color: #ffffff; text-decoration: none; border-radius: 12px; font-weight: 600; margin-top: 8px; box-shadow: 0 4px 12px rgba(36, 87, 214, 0.2);">$1</a>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

      const looksLikeHtml = /<\/?[a-z][\s\S]*>/i.test(rawText);
      if (looksLikeHtml) {
        msg.innerHTML = rawText;
        msg.dataset.htmlParsed = '1';
        msg.style.animation = 'aiHtmlFade 0.4s ease forwards';
        bindBotForms(msg);
        setTimeout(scrollToBottom, 100);
      }
    };

    const normalizeTypingMessages = () => {
      const { messages } = getChatElements();
      if (!messages) return;
      messages.querySelectorAll('.chat-message').forEach((msg) => {
        msg.classList.toggle('ai-typing-message', Boolean(msg.querySelector('.chat-typing')));
      });
    };

    const enhanceMessages = () => {
      const { messages } = getChatElements();
      if (!messages) return;

      messages.querySelectorAll('.chat-message').forEach((msg) => {
        if (msg.querySelector('.chat-typing')) return;
        parseBotHtml(msg);
        bindBotForms(msg);
        addTimestamp(msg);
        addCopyButton(msg);
      });
    };

    const enhanceComposer = () => {
      const { composer, input } = getChatElements();
      if (!composer || !input) return;

      unlockComposer(false);
      input.maxLength = CONSTANTS.maxChars;
      input.setAttribute('maxlength', String(CONSTANTS.maxChars));

      if (!input.dataset.aiBound) {
        input.dataset.aiBound = '1';
        input.addEventListener('input', () => {
          if (input.value.length > CONSTANTS.maxChars) input.value = input.value.slice(0, CONSTANTS.maxChars);
          autoResizeInput();
          updateCounter();
          unlockComposer(Boolean(input.value.trim()));
        });

        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' && !event.shiftKey) {
            setTimeout(() => {
              updateCounter();
              scrollToBottom();
            }, 180);
          }
        });
      }

      if (!composer.querySelector('.ai-bottom-bar')) {
        const bottomBar = document.createElement('div');
        bottomBar.className = 'ai-bottom-bar';

        const note = document.createElement('div');
        note.className = 'ai-composer-note';
        note.textContent = '[YOUR_AI_NAME] hata yapabilir.';

        const counter = document.createElement('div');
        counter.className = 'ai-char-counter';
        counter.textContent = `0 / ${CONSTANTS.maxChars}`;

        bottomBar.appendChild(note);
        bottomBar.appendChild(counter);
        composer.appendChild(bottomBar);
      }

      buildQuickActions(composer);
      autoResizeInput();
      updateCounter();
    };

    const enhanceChat = () => {
      enhanceComposer();
      normalizeTypingMessages();
      enhanceMessages();
      secureLinks();
    };

    chatContainer.addEventListener('pointerdown', (event) => {
      const msg = event.target.closest('.chat-message-from-bot');
      if (!msg || event.target.closest('.ai-copy-btn')) return;

      chatContainer.querySelectorAll('.chat-message-from-bot.ai-copy-visible').forEach((item) => {
        if (item !== msg) item.classList.remove('ai-copy-visible');
      });

      msg.classList.add('ai-copy-visible');
      clearTimeout(msg.__aiCopyTimer);
      msg.__aiCopyTimer = setTimeout(() => {
        msg.classList.remove('ai-copy-visible');
      }, CONSTANTS.copyVisibleMs);
    });

    chatContainer.addEventListener('focusin', (event) => {
      const msg = event.target.closest('.chat-message-from-bot');
      if (msg) msg.classList.add('ai-copy-visible');
    });

    chatContainer.addEventListener('submit', (event) => {
      if (event.target.closest('.chat-message-from-bot')) {
        setTimeout(() => unlockComposer(false), 150);
        setTimeout(() => unlockComposer(false), 900);
      }
    }, true);

    openButton.addEventListener('click', openChat);
    introButton?.addEventListener('click', openChat);
    closeButton.addEventListener('click', closeChat);

    document.addEventListener('mousedown', (event) => {
      if (!document.body.classList.contains('ai-open')) return;
      const innerPanel = document.querySelector('.ai-panel-inner');
      if (innerPanel && !innerPanel.contains(event.target) && !openButton.contains(event.target) && (!introButton || !introButton.contains(event.target))) {
        closeChat();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && document.body.classList.contains('ai-open')) closeChat();
    });

    handleIntroMessage();

    const observer = new MutationObserver(() => {
      window.requestAnimationFrame(enhanceChat);
    });

    let attempts = 0;
    const initInterval = setInterval(() => {
      attempts++;
      if (getChatElements().input || attempts > 50) {
        clearInterval(initInterval);
        enhanceChat();
        observer.observe(chatContainer, { childList: true, subtree: true });
      }
    }, 200);
  })();
</script>
