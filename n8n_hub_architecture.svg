<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 540" width="100%" height="100%">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#21262d" />
    </pattern>

    <!-- Drop Glow Filters -->
    <filter id="glowPurple" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#bc8cff" flood-opacity="0.15" />
    </filter>
    <filter id="glowCyan" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#58a6ff" flood-opacity="0.15" />
    </filter>
    <filter id="glowSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#010409" flood-opacity="0.5" />
    </filter>

    <!-- Linear Gradients -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d2a8ff" />
      <stop offset="100%" stop-color="#bc8cff" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#79c0ff" />
      <stop offset="100%" stop-color="#58a6ff" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#56d364" />
      <stop offset="100%" stop-color="#3fb950" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>

    <!-- Marker Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#30363d" />
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#58a6ff" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#d2a8ff" />
    </marker>
  </defs>

  <!-- Background Base (GitHub Dark Canvas) -->
  <rect width="950" height="540" rx="12" fill="#0d1117" />
  <rect width="950" height="540" fill="url(#grid)" rx="12" />
  
  <!-- Outer Stroke -->
  <rect x="1" y="1" width="948" height="538" rx="11" fill="none" stroke="#30363d" stroke-width="1.5" />

  <!-- Header Section -->
  <text x="50" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#f0f6fc">🤖 n8n AI Agent Hub Architecture</text>
  <text x="50" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e" font-weight="400">Unified orchestration of triggers, cognitive processing via Google Gemini, and automated targets</text>

  <!-- Connection Paths -->
  <!-- Left Triggers to n8n Hub -->
  <path d="M 230 190 Q 290 190 350 250" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 230 270 L 350 270" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 230 350 Q 290 350 350 290" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <!-- n8n Hub <--> Google Gemini AI -->
  <path d="M 450 220 L 450 165" fill="none" stroke="url(#purpleGrad)" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowPurple)" />
  
  <!-- n8n Hub to Outputs -->
  <path d="M 550 250 Q 615 190 680 190" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 550 270 L 680 270" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 550 290 Q 615 350 680 350" fill="none" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- COLUMN 1: INPUT SOURCES -->
  <g transform="translate(50, 120)" filter="url(#glowSoft)">
    <rect width="180" height="300" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="90" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#8b949e" letter-spacing="1" text-anchor="middle">INPUT SOURCES</text>
    
    <!-- Item 1: RSS -->
    <g transform="translate(15, 55)">
      <rect width="150" height="50" rx="8" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">📡 RSS News Feeds</text>
    </g>
    
    <!-- Item 2: Webhooks -->
    <g transform="translate(15, 125)">
      <rect width="150" height="50" rx="8" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">📋 Webhook Forms</text>
    </g>
    
    <!-- Item 3: Manual Inputs -->
    <g transform="translate(15, 195)">
      <rect width="150" height="50" rx="8" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">✍️ Manual Inputs</text>
    </g>

    <text x="90" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#484f58" font-weight="500" text-anchor="middle">Polled or Triggered Events</text>
  </g>

  <!-- COLUMN 2: ORCHESTRATION HUB (n8n Engine) -->
  <g transform="translate(350, 220)" filter="url(#glowCyan)">
    <rect width="200" height="100" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" />
    <text x="100" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#58a6ff" text-anchor="middle">n8n Engine</text>
    <text x="100" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" font-weight="500" text-anchor="middle">Workflow Orchestrator</text>
    <text x="100" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#484f58" font-weight="500" text-anchor="middle">(Structured Node Maps)</text>
  </g>

  <!-- COGNITIVE BRAIN (Google Gemini AI) -->
  <g transform="translate(350, 110)" filter="url(#glowPurple)">
    <rect width="200" height="50" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5" />
    <text x="100" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#d2a8ff" text-anchor="middle">✨ Google Gemini AI</text>
  </g>

  <!-- COLUMN 3: AUTOMATED OUTPUTS -->
  <g transform="translate(680, 120)" filter="url(#glowSoft)">
    <rect width="220" height="300" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="110" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#8b949e" letter-spacing="1" text-anchor="middle">AUTOMATED OUTPUTS</text>
    
    <!-- Item 1: WordPress -->
    <g transform="translate(20, 55)">
      <rect width="180" height="50" rx="8" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">📝 WP Blog Publications</text>
    </g>
    
    <!-- Item 2: Google Sheets -->
    <g transform="translate(20, 125)">
      <rect width="180" height="50" rx="8" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">📊 Google Sheets CRM</text>
    </g>
    
    <!-- Item 3: Drive & Social -->
    <g transform="translate(20, 195)">
      <rect width="180" height="50" rx="8" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">🔗 GDrive / LinkedIn</text>
    </g>

    <text x="110" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#484f58" font-weight="500" text-anchor="middle">Sanitized &amp; Validated Assets</text>
  </g>
</svg>
