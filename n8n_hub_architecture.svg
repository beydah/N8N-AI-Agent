<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 540" width="100%" height="100%">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#1e293b" />
    </pattern>

    <!-- Drop Glow Filters -->
    <filter id="glowPurple" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#a855f7" flood-opacity="0.25" />
    </filter>
    <filter id="glowCyan" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#06b6d4" flood-opacity="0.25" />
    </filter>
    <filter id="glowGreen" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#10b981" flood-opacity="0.25" />
    </filter>
    <filter id="glowSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.4" />
    </filter>

    <!-- Linear Gradients -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Marker Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#a855f7" />
    </marker>
  </defs>

  <!-- Background Base -->
  <rect width="950" height="540" rx="20" fill="#0b0f19" />
  <rect width="950" height="540" fill="url(#grid)" rx="20" />
  
  <!-- Outer Stroke -->
  <rect x="1" y="1" width="948" height="538" rx="19" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Title Section -->
  <text x="50" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#f8fafc">🤖 n8n AI Agent Hub Architecture</text>
  <text x="50" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" font-weight="500">Unified orchestration of triggers, cognitive processing via Google Gemini, and automated targets</text>

  <!-- Connection Paths -->
  <!-- Left Triggers to n8n Hub -->
  <path d="M 230 190 Q 290 190 350 250" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  <path d="M 230 270 L 350 270" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  <path d="M 230 350 Q 290 350 350 290" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  
  <!-- n8n Hub <--> Google Gemini AI -->
  <path d="M 450 220 L 450 165" fill="none" stroke="url(#purpleGrad)" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrowPurple)" />
  
  <!-- n8n Hub to Outputs -->
  <path d="M 550 250 Q 615 190 680 190" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  <path d="M 550 270 L 680 270" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  <path d="M 550 290 Q 615 350 680 350" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />

  <!-- COLUMN 1: INPUT SOURCES -->
  <g transform="translate(50, 120)" filter="url(#glowSoft)">
    <rect width="180" height="300" rx="16" fill="#111827" stroke="#1f2937" stroke-width="2" />
    <text x="90" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#94a3b8" letter-spacing="1" text-anchor="middle">📥 INPUT SOURCES</text>
    
    <!-- Item 1: RSS -->
    <g transform="translate(15, 60)">
      <rect width="150" height="50" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f8fafc">📡 RSS News Feeds</text>
    </g>
    
    <!-- Item 2: Webhooks -->
    <g transform="translate(15, 130)">
      <rect width="150" height="50" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f8fafc">📋 Webhook Forms</text>
    </g>
    
    <!-- Item 3: Manual Inputs -->
    <g transform="translate(15, 200)">
      <rect width="150" height="50" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f8fafc">✍️ Manual Inputs</text>
    </g>

    <text x="90" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#4b5563" font-weight="600" text-anchor="middle">Polled or Triggered Events</text>
  </g>

  <!-- COLUMN 2: ORCHESTRATION HUB (n8n Engine) -->
  <g transform="translate(350, 220)" filter="url(#glowCyan)">
    <rect width="200" height="100" rx="16" fill="url(#cyanGrad)" stroke="#67e8f9" stroke-width="1.5" />
    <text x="100" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">n8n Engine</text>
    <text x="100" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c7d2fe" font-weight="600" text-anchor="middle">Workflow Orchestrator</text>
    <text x="100" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#93c5fd" font-weight="500" text-anchor="middle">(Structured Node Maps)</text>
  </g>

  <!-- COGNITIVE BRAIN (Google Gemini AI) -->
  <g transform="translate(350, 110)" filter="url(#glowPurple)">
    <rect width="200" height="50" rx="25" fill="url(#purpleGrad)" stroke="#f472b6" stroke-width="1.5" />
    <text x="100" y="31" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">✨ Google Gemini AI</text>
  </g>

  <!-- COLUMN 3: AUTOMATED OUTPUTS -->
  <g transform="translate(680, 120)" filter="url(#glowSoft)">
    <rect width="220" height="300" rx="16" fill="#111827" stroke="#1f2937" stroke-width="2" />
    <text x="110" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#94a3b8" letter-spacing="1" text-anchor="middle">📤 AUTOMATED OUTPUTS</text>
    
    <!-- Item 1: WordPress -->
    <g transform="translate(20, 60)">
      <rect width="180" height="50" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f8fafc">📝 WP Blog Publications</text>
    </g>
    
    <!-- Item 2: Google Sheets -->
    <g transform="translate(20, 130)">
      <rect width="180" height="50" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f8fafc">📊 Google Sheets CRM</text>
    </g>
    
    <!-- Item 3: Drive & Social -->
    <g transform="translate(20, 200)">
      <rect width="180" height="50" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f8fafc">🔗 GDrive / LinkedIn</text>
    </g>

    <text x="110" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#4b5563" font-weight="600" text-anchor="middle">Sanitized &amp; Validated Assets</text>
  </g>
</svg>
